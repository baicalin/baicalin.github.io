---
layout: default
---
<section class="section-py position-relative bg-body">
    <div class="container-xxl flex-grow-1 container-p-y">
        <div class="app-academy">
            <div class="card mb-6">
                <div class="card-header d-flex flex-wrap justify-content-between gap-4">
                    <div class="card-title mb-0 me-1">
                        <h5 class="mb-0">My Courses</h5>
                        <p class="mb-0 text-body">Total 6 course you have purchased</p>
                    </div>
                    <div class="d-flex justify-content-md-end align-items-center gap-6 flex-wrap">
    <!--                    <select class="form-select form-select-sm w-px-250">-->
    <!--                        <option value="all courses">All Courses</option>-->
    <!--                        <option value="ui/ux">UI/UX</option>-->
    <!--                        <option value="seo">SEO</option>-->
    <!--                        <option value="web">Web</option>-->
    <!--                        <option value="music">Music</option>-->
    <!--                        <option value="painting">Painting</option>-->
    <!--                    </select>-->

    <!--                    <div class="form-check form-switch mb-0">-->
    <!--                        <input type="checkbox" class="form-check-input" id="CourseSwitch" checked="">-->
    <!--                        <label class="form-check-label text-nowrap mb-0" for="CourseSwitch">Hide completed</label>-->
    <!--                    </div>-->
                    </div>
                </div>
                <div class="card-body mt-1">
                    <div class="row gy-6 mb-6">
                        {% for post in site.posts %}
                            <div class="col-sm-6 col-lg-4">
                                <div class="card p-2 h-100 shadow-none border rounded-3">
                                    <div class="rounded-4 text-center mb-5">
                                        <a href="{{ post.url }}"><img class="img-fluid" src="../../assets/img/pages/app-academy-tutor-1.png" alt="tutor image 1"></a>
                                    </div>
                                    <div class="card-body p-3 pt-0">
                                        <div class="d-flex justify-content-between align-items-center mb-4">
                                            <span class="badge rounded-pill bg-label-primary">Jekyll</span>
                                        </div>
                                        <a class="h4" href="{{ post.url }}">{{ post.title }}</a>
                                        <p class="mt-1">{{ post.excerpt }}</p>
                                        <p class="d-flex align-items-center mb-1">
                                            {{ post.date | date_to_string }}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                    <nav aria-label="Page navigation" class="d-flex align-items-center justify-content-center">
                        <ul class="pagination mb-0">
                            <li class="page-item first">
                                <a class="page-link waves-effect" href="javascript:void(0);"><i class="tf-icon ri-skip-back-mini-line ri-22px"></i></a>
                            </li>
                            <li class="page-item prev">
                                <a class="page-link waves-effect" href="javascript:void(0);"><i class="tf-icon ri-arrow-left-s-line ri-22px"></i></a>
                            </li>
                            <li class="page-item">
                                <a class="page-link waves-effect" href="javascript:void(0);">1</a>
                            </li>
                            <li class="page-item">
                                <a class="page-link waves-effect" href="javascript:void(0);">2</a>
                            </li>
                            <li class="page-item active">
                                <a class="page-link waves-effect" href="javascript:void(0);">3</a>
                            </li>
                            <li class="page-item">
                                <a class="page-link waves-effect" href="javascript:void(0);">4</a>
                            </li>
                            <li class="page-item">
                                <a class="page-link waves-effect" href="javascript:void(0);">5</a>
                            </li>
                            <li class="page-item next">
                                <a class="page-link waves-effect" href="javascript:void(0);"><i class="tf-icon ri-arrow-right-s-line ri-22px"></i></a>
                            </li>
                            <li class="page-item last">
                                <a class="page-link waves-effect" href="javascript:void(0);"><i class="tf-icon ri-skip-forward-mini-line ri-22px"></i></a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</section>
