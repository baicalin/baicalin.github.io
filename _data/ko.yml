examples:
  target_discovery:
    example_detail:
      eyebrow: "예시 상세"
      title: "타겟 발굴"
      summary: "이 예시는 팀이 퍼터베이션 가설을 평가하고, 비용이 큰 검증 실험에 들어가기 전에 후보 타겟을 좁히는 방법을 보여줍니다."
      problem: "팀은 방대한 후보 목록에서 고신뢰 개입 후보를 식별하면서, 웻랩 실험 횟수를 줄여야 합니다."
      approach_steps:
        - "질환 관련 데이터셋을 선택하고 baseline과 treated 조건을 정의합니다."
        - "후보 유전자에 대해 녹다운 시뮬레이션을 실행하고 마커 반응을 비교합니다."
        - "효과 크기, 일관성, 생물학적 타당성을 기준으로 타겟을 우선순위화합니다."
      outcomes:
        - "후속 검증을 위한 후보 세트 단축."
        - "시뮬레이션 결과에 연결된 추적 가능한 근거 확보."
        - "인실리코 분석에서 실험 계획으로 더 빠른 전환."
      next_cta:
        label: "Condition Spec 읽기"
        url: "/docs/condition-spec/"

