value_props:
  heading: "KnockG가 필요한 이유"
  description: "자동화된 파이프라인을 통해 프로그래밍에 익숙하지 않은 생명과학 연구자도 손쉽게 오믹스 데이터를 다루고, 가상 데이터를 통해 유효한 조건을 탐색하여 실험 및 임상에 소요되는 시간과 비용을 줄이며 나아가 in silico 기반 근거생성 연구에 활용 할 수 있도록 설계했습니다."
  items:
    - title: "희소 샘플 데이터의 가상생성"
      description: "경제·윤리적 이유로 획득이 불가하거나,
       희귀질환으로 획득이 어려운 샘플 및 조건의
       데이터를 가상으로 생성하여 활용할 수 있습니다."
    - title: "실험·진단·임상 결과 데이터 생성"
      description: "학습 데이터에 포함되지 않은 기초연구에서의 타겟 억제 실험,
       약물 임상에서의 코호트 별 결과, 세포 배양 등의 공정에서의 공정변수 별 데이터를 생성합니다."
    - title: "데이터 전처리/생성조건 입력/시각화"
      description: "생성에 요구되는 오믹스 데이터의 전처리와
       복잡한 생성 조건의 입력 및 생성 데이터의 분석 및 시각화 기능을 제공합니다."
