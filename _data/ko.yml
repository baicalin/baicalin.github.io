# title: 홈
# description: KnockG로 유전자 섭동 가설 검증을 더 빠르게 시작하세요.

hero:
  eyebrow: "KnockG MVP"
  title: "생명과학과 인공지능을 연결하다 / 실험 전에 섭동 결과를 먼저 시뮬레이션하세요"
  subtitle: "실리코팜의 오믹스 생성 인공지능 솔루션 KnockG<sup>TM</sup>은 저비용 고효율로 가상의 실험결과 값을 생성하여 기초, 의학 및 제약 분야 연구를 가속화 합니다. / KnockG는 기존 오믹스 데이터를 기반으로 가상 결과를 생성해 바이오 및 신약개발 팀의 가설 검증 속도를 높입니다."
  button_text: "무료 버전 바로 사용해보기"

  primary_cta:
    label: "시작하기"
    url: "/get-started/"
  secondary_cta:
    label: "문서 보기"
    url: "/docs/"
  badges:
    - "웹 앱과 API 동시 지원"
    - "중개연구 워크플로에 최적화"
    - "질문에서 후보군 도출까지 한 흐름"
  panel_heading: "첫날 바로 할 수 있는 작업"
  panel_points:
    - "보유 데이터를 불러오고 섭동 시나리오를 선택합니다."
    - "후보 타깃에 대한 가상 발현 변화를 생성합니다."
    - "결과를 내보내어 팀 검토와 우선순위 결정에 활용합니다."

value_props:
  heading: "팀이 KnockG를 선택하는 이유"
  description: "가설 수립부터 의사결정까지 반복 속도를 높이도록 구조화되어 있습니다."
  items:
    - title: "초기 탐색 주기 단축"
      description: "비용이 큰 실험 전에 여러 타깃 가설을 먼저 평가할 수 있습니다."
    - title: "섭동 조건 비교 용이"
      description: "knockdown/activation 조건을 일관된 출력 형식으로 나란히 비교할 수 있습니다."
    - title: "의사결정 추적 가능"
      description: "가정, 생성 결과, 후보 선정 근거를 재현 가능한 형태로 남길 수 있습니다."

how_it_works:
  heading: "작동 방식"
  description: "원천 데이터에서 후보 우선순위까지, 최소 3단계로 진행합니다."
  steps:
    - title: "준비 및 설정"
      description: "데이터셋과 기준 조건을 정하고 섭동할 유전자/단백질을 선택합니다."
    - title: "생성 및 점검"
      description: "모델 실행 후 가상 오믹스 결과, 마커 변화, 신뢰 신호를 확인합니다."
    - title: "우선순위 및 공유"
      description: "효과와 일관성을 기준으로 후보를 정렬하고 팀 검토용으로 내보냅니다."

collaboration:
  heading: "협업 연구를 위한 구조"
  description: "KnockG는 계산생물학 팀, 실험팀, 외부 파트너 간 협업 워크플로를 지원합니다."
  points:
    - "하나의 시뮬레이션 문제 정의로 팀 정렬"
    - "일관된 모델 출력으로 타깃 근거 검토"
    - "in silico 후보군에서 실험 계획으로 자연스럽게 전환"
  cta:
    heading: "실전 예시 확인"
    description: "활용 시나리오와 예상 출력 형태를 확인하세요."
    label: "예제 보기"
    url: "/examples/"

get_started:
  hero:
    eyebrow: "시작하기"
    title: "몇 분 안에 첫 KnockG 워크플로를 실행해 보세요"
    subtitle: "빠른 탐색은 웹 앱에서 시작하고, 반복 가능한 파이프라인이 필요해지면 API로 확장하세요."
    primary_cta:
      label: "문서 열기"
      url: "/docs/"
    secondary_cta:
      label: "예시 보기"
      url: "/examples/"
    side_panel:
      heading: "MVP 범위"
      description: "이 가이드는 설정, 첫 실행, 최소 API 호출까지를 다룹니다."

  quickstart:
    heading: "빠른 시작"
    description: "아래 순서대로 진행하면 계정 설정부터 첫 결과 검토까지 빠르게 도달할 수 있습니다."
    steps:
      - kicker: "Step 1"
        title: "워크스페이스와 데이터셋 준비"
        description: "기준 조건(baseline), 후보 타깃, 비교에 사용할 기대 출력(지표/마커)을 정의합니다."
      - kicker: "Step 2"
        title: "첫 섭동(perturbation) 실행"
        description: "웹 인터페이스에서 시나리오 1개를 설정하고 초기 가상 오믹스 결과를 생성합니다."
      - kicker: "Step 3"
        title: "검토 및 내보내기"
        description: "마커 수준 변화를 확인하고 후보군을 추린 뒤, 실행 요약을 내보냅니다."

  web_vs_api:
    heading: "Web vs API"
    description: "현재 단계와 팀 워크플로에 맞는 인터페이스를 선택하세요."
    web:
      title: "웹 앱"
      description: "탐색과 협업 기반 검토에 최적입니다."
      points:
        - "가이드 입력과 시각적 검증으로 빠르게 시작할 수 있습니다."
        - "초기 타깃 브레인스토밍/리뷰 미팅에 유용합니다."
        - "비기술 이해관계자도 확인 가능한 요약을 내보낼 수 있습니다."
    api:
      title: "API"
      description: "자동화와 재현 가능한 실행에 최적입니다."
      points:
        - "내부 파이프라인 및 노트북 환경과 쉽게 연동됩니다."
        - "표준화된 파라미터 기반 실행을 지원합니다."
        - "배치 실행과 후속 툴링(다운스트림 분석) 확장이 가능합니다."

  code:
    heading: "최소 API 예시"
    description: "연동을 시작할 때 참고할 수 있는 최소 요청 예시입니다."
    doc_link:
      label: "API 문서"
      url: "/docs/api/"
    snippet: |
      curl -X POST "https://api.knockg.com/v1/simulations" \
        -H "Authorization: Bearer <YOUR_API_KEY>" \
        -H "Content-Type: application/json" \
        -d '{
          "dataset_id": "ds_example_001",
          "mode": "knockdown",
          "targets": ["GENE_A", "GENE_B"],
          "condition": "treated"
        }'

