docs_pages:
  docs_getting_started:
    heading: "시작하기"
    intro: "이 페이지를 따라 첫 시뮬레이션을 실행하고, 출력 품질을 빠르게 검증할 수 있습니다."
    sections:
      - type: h3
        text: "체크리스트"
      - type: ul
        items:
          - "baseline과 treated 조건을 포함한 데이터셋이 준비되어 있습니다."
          - "섭동할 타깃 유전자 또는 단백질이 선정되어 있습니다."
          - "첫 실행 성공 기준(지표/마커 등)이 정의되어 있습니다."
      - type: h3
        text: "첫 실행 흐름"
      - type: ol
        items:
          - "새 시뮬레이션을 생성하고 섭동 모드를 선택합니다."
          - "조건 파라미터와 선택된 타깃을 설정합니다."
          - "실행 후 마커 수준 변화를 확인하고 요약을 내보냅니다."
      - type: alert_next
        prefix: "다음: 팀 내 해석을 맞추기 위해 "
        link_label: "개념"
        url: "/docs/concepts/"
        suffix: "을 읽어보세요."

  docs_concepts:
    heading: "개념"
    intro: "설계, 실행, 리뷰에서 공통으로 사용할 용어를 정리합니다."
    sections:
      - type: h3
        text: "섭동 모드(Perturbation Mode)"
      - type: p_html
        html: "시뮬레이션에서 타깃을 어떻게 변경하는지 정의합니다. 대표 모드는 <code>knockdown</code>, <code>activation</code>입니다."
      - type: h3
        text: "조건(Condition)"
      - type: p
        text: "타깃 효과를 추정하는 실험 맥락(예: control vs treated)을 의미합니다."
      - type: h3
        text: "출력 해석(Output Interpretation)"
      - type: ul
        items:
          - "효과 크기와 일관성으로 후보를 우선순위화합니다."
          - "생물학적 근거에 맞춰 마커 수준 반응을 검토합니다."
          - "내보낸 결과를 후속 랭킹/실험 계획에 활용합니다."
      - type: alert_next
        prefix: "다음: 재현 가능한 입력을 위해 "
        link_label: "조건 명세"
        url: "/docs/condition-spec/"
        suffix: "를 정의하세요."

  docs_condition_spec:
    heading: "조건 명세(Condition Spec)"
    intro: "조건 명세는 시뮬레이션 요청을 안정적이고 반복 가능한 구조로 정의합니다."
    sections:
      - type: h3
        text: "필수 필드"
      - type: ul
        items:
          - "<code>dataset_id</code>: 준비된 데이터 식별자"
          - "<code>mode</code>: <code>knockdown</code> 등 섭동 모드"
          - "<code>targets</code>: 섭동할 유전자/단백질 목록"
          - "<code>condition</code>: 시나리오를 구분하는 조건 라벨"
      - type: h3
        text: "예시 스펙"
      - type: pre
        code: |
          {
            "dataset_id": "ds_example_001",
            "mode": "knockdown",
            "targets": ["GENE_A", "GENE_B"],
            "condition": "treated"
          }
      - type: alert_next
        mt5: true
        prefix: "다음: 엔드포인트 호출은 "
        link_label: "API"
        url: "/docs/api/"
        suffix: "에서 확인하세요."

  docs_api:
    heading: "API"
    intro: "반복 가능하고 스크립트 기반의 시뮬레이션 실행에는 API를 사용하세요."
    sections:
      - type: h3
        text: "인증(Authentication)"
      - type: p_html
        html: "<code>Authorization</code> 헤더에 <code>Bearer &lt;YOUR_API_KEY&gt;</code> 형태로 API 키를 전달합니다."
      - type: h3
        text: "엔드포인트(Endpoint)"
      - type: ul
        items:
          - "<code>POST /v1/simulations</code>: 시뮬레이션 요청 생성 및 실행"
      - type: h3
        text: "최소 요청 예시"
      - type: pre
        code: |
          curl -X POST "https://api.knockg.com/v1/simulations" \
            -H "Authorization: Bearer <YOUR_API_KEY>" \
            -H "Content-Type: application/json" \
            -d '{
              "dataset_id": "ds_example_001",
              "mode": "knockdown",
              "targets": ["GENE_A", "GENE_B"],
              "condition": "treated"
            }'
      - type: h3
        text: "응답 형식(Response shape)"
      - type: pre
        code: |
          {
            "simulation_id": "sim_12345",
            "status": "completed",
            "summary": {
              "top_candidates": ["GENE_A", "GENE_B"]
            }
          }



# value_props:
#   heading: "유용한 기능들"
#   description: "실험 없이 결과 오믹스 데이터를 생성"
#   items:
