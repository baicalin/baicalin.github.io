faq:
  section_title: "FAQ"
  main_title: "자주 묻는 질문들"
  contact_info: "이외의 문의 및 요청은 메일(contact@silicopharm.com)을 통해 가능합니다."
  items:
    - id: "qna_0"
      question: "얼마나 정확한가요?"
      answer: "다양한 통계적 방법론을 통해 솔루션의 유의성을 검증하고 있으며, 별도 요청 시 관련 문헌과 POC 결과값을 송부드리고 있습니다."
    - id: "qna_1"
      question: "솔루션을 사용하려면 어떻게 해야 하나요?"
      answer: "lite.knockg.com 혹은 www.knockg.com에 접속 후 회원가입 하면 바로 사용할 수 있습니다!"
    - id: "qna_2"
      question: "KnockG와 KnockG(PAID)의 차이는 무엇인가요?"
      answer: "결제를 하지 않은 경우에도 모든 기능을 사용할 수 있으나 타겟들은 비식별화 처리 된 상태로 나타납니다. 비식별화 처리 된 상태여도 주요 마커 발현량의 변화와 타겟의 발현량 변화는 확인할 수 있어, 실제 결제 전 도출 결과의 정합성을 파악할 수 있습니다. 비식별화 처리는 결재 후 해제 가능합니다."
    - id: "qna_3"
      question: "어떤 데이터를 사용해야 하나요?"
      answer: "Normalized 된 발현량 데이터면 학습이 가능하며, 현재 모델은 단일세포 전사체에서 높은 정확성을 보이고 있습니다."
    - id: "qna_4"
      question: "결제 방법 및 기간은 어떻게 되나요?"
      answer: "질환 별 및 cell-type 별로 학습되는 인공지능 모델 단위로 결제할 수 있으며, 결제 완료된 모델에서의 분석에는 추가 비용을 책정하고 있지 않습니다."
    - id: "qna_5"
      question: "솔루션을 사용하면 어떤 이점이 있나요?"
      answer: "솔루션을 활용하여 30분 내에 신규 타겟을 도출하는 것 외에도, 특정한 상황에서의 발현량 변화 값을 실험 없이 예측할 수 있습니다."  

