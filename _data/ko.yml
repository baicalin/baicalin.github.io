collaboration:
  heading: "타 AI와 함께 사용가능한 구조"
  description: "KnockG는 웹 애플리케이션, API, MCP 형태로 제공되어 구조 기반 AI 및 오믹스 AI와 연동해 사용할 수 있는 데이터 생성·증강 레이어입니다."
  points:
    - "비전문가도 활용 가능한 직관적인 웹 기반 인터페이스 제공"
    - "API 및 MCP를 통해 다양한 AI 시스템과의 연동 지원"
    - "타겟 탐색부터 전임상·임상 단계 별 기능으로 구조 AI와 연계"
    - "판별형 오믹스 AI에 가상 입력 데이터(미래 시점·코호트 등)를 제공해 분석 성능 확장"
  cta:
    heading: "활용 예시 확인"
    description: "질환 타겟 탐색, 임상 분야 활용, 공정조건 최적화 등 다양한 적용 사례를 살펴보세요."
    label: "예시 보기"
    url: "/examples/"    

get_started:
  hero:
    eyebrow: "시작하기"
    title: "지금 바로 첫 분석을 시작해 보세요"
    subtitle: "웹에서 회원가입 후 무료로 빠르게 시작하고, 필요할 때 확장할 수 있습니다."
    primary_cta:
      label: "문서 열기"
      url: "/docs/"
    secondary_cta:
      label: "예시 보기"
      url: "/examples/"
    side_panel:
      heading: "시작하기 범위"
      description: "이 가이드는 데이터셋 선택, 생성 조건 입력, 결과물 조회까지를 다룹니다."

  quickstart:
    # heading: "빠른 시작"
    # description: "아래 순서대로 진행하면 계정 설정부터 첫 결과 검토까지 빠르게 도달할 수 있습니다."
    steps:
      - kicker: "Step 1"
        title: "데이터셋 선택"
        description: "분석 화면의 상단 선택 창을 통해 
         가용한 데이터셋을 검색하고, 기 전처리 된 데이터셋을 선택할 수 있습니다. 
         (<a href='https://www.knockg.com/screenings/new?subcategory=screening'>링크</a>)"
      - kicker: "Step 2"
        title: "생성 조건 입력"
        description: "데이터셋 선택 후 탐색할 섭동·질환(예 - breast cancer)과
         생성 조건 Preset(예 - 단일 타겟 녹다운)을 선택합니다
         (<a href='https://www.knockg.com/screenings/new?subcategory=screening&perturbation=1&preset=1'>링크</a>)"
      - kicker: "Step 3"
        title: "생성 데이터 분석 및 내보내기"
        description: "생성 데이터 기반의 도출 후보군을 조회하고 각 
         후보군에서의 주요 마커 발현량 변화, 문헌·특허·약물 정보를 확인할 수 있습니다.
         (<a href='https://www.knockg.com/screenings/1066'>링크</a>)"

  web_vs_api:
    heading: "Web vs API"
    description: "작업 요건에 맞는 인터페이스를 선택하세요."
    web:
      title: "웹 어플리케이션"
      description: "빠른 탐색 및 검토에 최적입니다."
      points:
        - "시작하기 가이드 및 Agent를 통해 빠르게 시작할 수 있습니다."
        - "초기 타깃 브레인스토밍/리뷰 미팅에 유용합니다."
        - "프로그래밍 비 전문가도 손쉽게 사용할 수 있습니다."
    api:
      title: "API"
      description: "자동화와 대용량 실행에 최적입니다."
      points:
        - "내부 파이프라인 및 노트북 환경과 쉽게 연동됩니다."
        - "표준화된 파라미터 기반 실행을 지원합니다."
        - "대규모 데이터 분석에 효과적입니다."

  code:
    heading: "API 예시"
    description: "연동을 시작할 때 참고할 수 있는 최소 요청 예시입니다."
    doc_link:
      label: "API 문서"
      url: "/docs/api/"
    snippet: |
      curl -X POST "https://api.knockg.com/v1/simulations" \
        -H "Authorization: Bearer <YOUR_API_KEY>" \
        -H "Content-Type: application/json" \
        -d '{
          "dataset_id": "ds_example_001",
          "mode": "knockdown",
          "targets": ["GENE_A", "GENE_B"],
          "condition": "treated"
        }'

