docs_pages:
  docs_getting_started:
    heading: "시작하기"
    intro: "이 페이지를 따라가면 첫 조건 기반 생성 실행을 완료하고, 생성 결과가 연구 질문에 맞는지 빠르게 점검할 수 있습니다."
    sections:
      - type: h3
        text: "이 문서가 다루는 범위"
      - type: p
        text: "웹 앱에서 첫 프로젝트를 만들고, 조건을 설정한 뒤, 생성 결과를 검토하고 내보내는 최소 흐름을 설명합니다. 빠른 탐색은 웹에서 시작하고, 반복 실행이나 내부 파이프라인 연동이 필요해지면 API로 확장하는 것을 권장합니다."
      - type: h3
        text: "시작 전 체크리스트"
      - type: ul
        items:
          - "분석하려는 질문이 정리되어 있습니다. 예: 특정 타겟 녹다운 시 질환 진행이 완화되는가, 특정 배양조건에서 생산성이 높아지는가."
          - "참조할 데이터셋 또는 사용할 생성 모델이 준비되어 있습니다."
          - "비교할 조건이 정의되어 있습니다. 예: baseline vs treated, control vs knockdown, 초기 vs 후기 시점."
          - "처음 확인할 마커, 지표, 또는 후보 우선순위 기준이 정리되어 있습니다."
          - "결과를 누구와 어떻게 검토할지 정해져 있습니다. 예: 팀 미팅용 요약, 후속 실험 후보 리스트, 보고서 공유."
      - type: h3
        text: "첫 실행 흐름"
      - type: ol
        items:
          - "새 프로젝트 또는 시뮬레이션을 생성하고, 사용할 데이터셋 또는 모델을 선택합니다."
          - "비교 기준이 되는 조건과 생성하려는 조건을 정합니다."
          - "타겟, 시점, 세포유형, 질환 맥락, 배양 또는 투여 조건 등 필요한 입력값을 설정합니다."
          - "실행 후 생성된 오믹스 결과와 마커 변화, 후보 우선순위, 요약 신호를 확인합니다."
          - "필요한 결과를 저장하거나 내보내고, 후속 실험 또는 추가 분석 항목을 정리합니다."
      - type: h3
        text: "첫 실행에서 우선 확인할 것"
      - type: ul
        items:
          - "핵심 마커의 변화 방향이 연구 가설과 크게 어긋나지 않는지 확인합니다."
          - "조건 간 차이가 충분히 분리되어 해석 가능한지 검토합니다."
          - "상위 후보가 알려진 생물학적 근거나 기존 문헌과 어느 정도 정합적인지 살펴봅니다."
          - "실제 실험으로 바로 검증할 후보 수를 좁힐 수 있는지 확인합니다."
      - type: h3
        text: "웹 앱으로 시작하고 API로 확장하기"
      - type: p
        text: "웹 앱은 탐색과 협업 검토에 적합하고, API는 반복 가능하고 스크립트 기반의 자동화 실행에 적합합니다. 첫 실행은 웹 앱에서 맥락을 확인하고, 이후 동일한 구조를 API 요청으로 옮기면 팀 내 재현성을 높이기 좋습니다."
      - type: alert_next
        prefix: "다음: 팀 내 해석 기준을 맞추기 위해 "
        link_label: "개념"
        url: "/docs/concepts/"
        suffix: "을 먼저 정리해 보세요."

  docs_concepts:
    heading: "개념"
    intro: "설계, 실행, 리뷰 과정에서 같은 의미로 사용할 핵심 용어를 정리합니다."
    sections:
      - type: h3
        text: "오믹스 파운데이션 모델(Omics Foundation Model)"
      - type: p
        text: "오믹스 파운데이션 모델은 유전자·단백질 발현량과 같은 오믹스 데이터를 조건에 맞게 가상으로 생성하는 생성형 인공지능입니다. 실제 실험 전에 다양한 조건을 빠르게 검토해 가설을 좁히고, 더 유망한 실험에 자원을 집중할 수 있도록 돕습니다."
      - type: h3
        text: "조건 기반 생성(Condition-driven Generation)"
      - type: p
        text: "생성 결과는 단일 타겟이나 단일 라벨만으로 정해지지 않습니다. 질환 맥락, 세포유형, 시점, 유전형, 투여 또는 배양 조건처럼 연구자가 지정한 조건 조합이 함께 반영됩니다."
      - type: h3
        text: "대표 생성 시나리오"
      - type: ul
        items:
          - "<code>knockdown</code>: 특정 유전자 또는 단백질이 억제된 조건의 데이터를 생성합니다."
          - "시계열 생성: 학습 데이터에 없는 중간 시점이나 미래 시점의 데이터를 생성합니다."
          - "투여·배양 조건 생성: 약물, 처리 조건, 배양 환경 변화에 따른 데이터를 생성합니다."
      - type: h3
        text: "기준 조건(Baseline)과 비교 조건(Condition)"
      - type: p
        text: "기준 조건은 현재 상태나 비교의 출발점이고, 비교 조건은 생성하려는 목표 상황입니다. 예를 들어 control 대비 knockdown, 정상 대비 질환, 기본 배양조건 대비 최적화 조건처럼 정의할 수 있습니다."
      - type: h3
        text: "출력 해석(Output Interpretation)"
      - type: ul
        items:
          - "마커 변화: 개별 마커나 패널 수준에서 방향성과 크기를 확인합니다."
          - "조건 분리: 생성 결과가 서로 다른 조건을 충분히 구분하는지 살펴봅니다."
          - "후보 우선순위화: 효과 크기, 일관성, 기존 생물학적 근거를 함께 고려합니다."
          - "후속 실험 연결: 내보낸 결과를 랭킹, 검증 실험 설계, 보고서 작성에 활용합니다."
      - type: h3
        text: "Pseudo-blotting과 후보 검토"
      - type: p_html
        html: "Lite.KnockG에서는 <code>pseudo-blotting</code>처럼 특정 타겟 녹다운 시의 마커 발현량 변화를 빠르게 확인할 수 있고, 상위 버전에서는 신규 모델 학습, 시계열 구성, 다중 타겟 분석, 문헌·특허 조회, 네트워크 분석 등 더 넓은 검토가 가능합니다."
      - type: h3
        text: "In silico 검토와 실험 검증"
      - type: p
        text: "KnockG의 목적은 웻랩을 대체하는 것이 아니라, 실제 실험 전에 가능한 조건을 더 넓게 탐색하고 유망한 후보를 더 좁혀 실험의 시간과 비용을 줄이는 것입니다."
      - type: alert_next
        prefix: "다음: 재현 가능한 입력을 만들려면 "
        link_label: "조건 명세"
        url: "/docs/condition-spec/"
        suffix: "를 정리하세요."

  docs_condition_spec:
    heading: "조건 명세(Condition Spec)"
    intro: "조건 명세는 어떤 질문을 어떤 조건으로 실행했는지 기록하는 최소 단위입니다. 잘 정의된 조건 명세는 반복 실행, 팀 공유, 결과 비교를 훨씬 쉽게 만듭니다."
    sections:
      - type: h3
        text: "왜 필요한가요?"
      - type: p
        text: "같은 타겟이라도 질환 맥락, 세포유형, 시점, 투여 조건이 달라지면 결과 해석이 완전히 달라질 수 있습니다. 조건 명세는 실행 맥락을 함께 보존해 결과를 다시 재현하고 비교할 수 있도록 합니다."
      - type: h3
        text: "필수 필드"
      - type: ul
        items:
          - "<code>dataset_id</code>: 준비된 데이터 또는 모델의 식별자"
          - "<code>mode</code>: 실행 유형 예: <code>knockdown</code>"
          - "<code>targets</code>: 섭동하거나 비교할 유전자/단백질 목록"
          - "<code>condition</code>: 시나리오를 구분하는 조건 라벨"
      - type: h3
        text: "권장 메타데이터"
      - type: ul
        items:
          - "기준 조건 이름 예: control, untreated, baseline"
          - "질환 또는 코호트 정보 예: ALS, NSCLC, sporadic, responder"
          - "세포유형 또는 조직 정보 예: motor_neuron, hepatocyte, CHO"
          - "시점 정보 예: early, mid, late, d18"
          - "약물·배양·투여 맥락 예: dose, medium, growth factor, oxygen"
          - "주요 readout 예: marker_panel, candidate_ranking, export_summary"
      - type: h3
        text: "조건 라벨 작성 팁"
      - type: ul
        items:
          - "짧지만 구분 가능한 이름을 사용합니다."
          - "질환/세포유형/시점/처리 조건이 섞여 있다면 일정한 순서로 적습니다."
          - "팀 내에서 같은 의미를 같은 단어로 쓰도록 규칙을 맞춥니다."
      - type: h3
        text: "예시 스펙"
      - type: pre
        code: |
          {
            "dataset_id": "ds_als_motor_neuron_v1",
            "mode": "knockdown",
            "targets": ["GENE_A", "GENE_B"],
            "condition": "sporadic_motor_neuron_d18"
          }
      - type: h3
        text: "해석 예시"
      - type: p
        text: "위 스펙은 ALS의 sporadic 코호트, motor neuron, d18 맥락에서 특정 타겟 녹다운 조건을 생성·비교하기 위한 최소 요청 예시로 볼 수 있습니다. 실제 운영에서는 기준 조건 이름, 마커 패널, 내보내기 형식 같은 메타데이터를 함께 관리하면 더 유용합니다."
      - type: alert_next
        mt5: true
        prefix: "다음: 스크립트 기반 호출은 "
        link_label: "API"
        url: "/docs/api/"
        suffix: "에서 확인하세요."

  docs_api:
    heading: "API"
    intro: "대규모 가능한 실행, 노트북 연동, 
      내부 파이프라인 자동화에는 API를 사용하세요."
    sections:
      - type: h3
        text: "인증(Authentication)"
      - type: p_html
        html: "<code>Authorization</code> 헤더에 <code>Bearer &lt;YOUR_API_KEY&gt;</code> 형태로 API 키를 전달합니다."
      - type: h3
        text: "기본 엔드포인트"
      - type: ul
        items:
          - "<code>POST /v1/simulations</code>: 시뮬레이션 요청 생성 및 실행"
      - type: h3
        text: "Put simulation job"
      - type: pre
        code: |
          curl -X POST "https://api.knockg.com/v1/simulations" \
            -H "Authorization: Bearer <YOUR_API_KEY>" \
            -H "Content-Type: application/json" \
            -d '{
              "dataset_id": "ds_example_001",
              "mode": "knockdown",
              "targets": ["GENE_A", "GENE_B"],
              "condition": "treated"
              ...
            }'
      # - type: h3
      #   text: "Response"
      # - type: pre
      #   code: |
      #     {
      #       "simulation_id": "sim_12345",
      #       "status": "completed",
      #       "summary": {
      #         "top_candidates": ["GENE_A", "GENE_B"]
      #       }
      #     }
      # - type: h3
      #   text: "Web + API workflow"
      # - type: p
      #   text: "Explore in the web app, then scale with API for standardized and automated workflows."

      - type: h3
        text: "List available datasets"

      - type: pre
        code: |        
          curl -X GET "https://api.knockg.com/v1/datasets?secret=<KNOCKG_API_SECRET>" \
            -H "Accept: application/json"
      
      - type: h3
        text: "List output genes for one screening"

      - type: pre
        code: |        
          curl -X GET "https://api.knockg.com/v1/screenings/<SCREENING_ID>/output_genes?secret=<KNOCKG_API_SECRET>" \
            -H "Accept: application/json"


