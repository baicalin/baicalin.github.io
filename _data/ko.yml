      description: "기 전처리된 데이터를 선택하거나 '가져오기', '업로드' 등의 방법으로 신규 데이터의 업로드가 가능합니다."
    - title: "조건별 데이터 생성"
      description: "사용자가 입력한 조건에 따라, 학습 데이터에 없는 오믹스 데이터를 가상으로 생성합니다. (타겟 억제·시점 확장·약물 투여 조건 등)"
    - title: "비교·분석·검증 및 활용"
