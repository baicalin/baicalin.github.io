hero:
  eyebrow: "KnockG"
  title: "가상의 실험·진단·임상 결과를 생성/활용하세요"
  subtitle: "실리코팜의 오믹스 파운데이션 모델 솔루션 KnockG<sup>TM</sup>는
   사용자가 입력한 조건의 실험·진단·임상 결과 오믹스 데이터를 가상으로 생성하고 분석하는
   기능을 제공합니다. 생명과학 연구자, 의사 등의 사용자는 이를 활용해 질환의 신규 타겟 발굴
   최적 임상 조건 선정, 세포 치료제 등의 생산 공정 최적화 등을 수행할 수 있습니다."
  button_text: "무료 버전 시작하기"

  primary_cta:
    label: "바로 시작하기"
    url: "/get-started/"
  secondary_cta:
    label: "문서 보기"
    url: "/docs/"
  badges:
    - "웹 어플리케이션"
    - "시계열 및 조건별 오믹스 데이터 생성"
    - "종양 및 뇌·신경질환 검증 사례"
    - "항체, 세포치료제 등 혁신 신약 기업 PoC 사례"
  panel_heading: "주요 기능"
  panel_points:
    - "공개 및 업로드한 오믹스 데이터의 자동 전처리"
    - "타겟 억제, 약물 단독·병용 투여 등 사용자 입력 조건 별 가상 데이터 생성/활용"
    - "Missing timepoint(중간·미래 등)의 데이터 가상 생성/활용"
    - "Blotting 등 가상의 실험 결과 데이터를 생성하여 실험 전 유효한 조건 탐색"
    - "유효 조건의 순위와 각 조건 별 학술·문헌·약물 데이터베이스 검색"
