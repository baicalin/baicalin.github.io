docs_pages:
  docs_getting_started:
    heading: "Getting Started"
    intro: "Use this page to run your first simulation and validate output quality quickly."
    sections:
      - type: h3
        text: "Checklist"
      - type: ul
        items:
          - "Dataset is prepared with baseline and treated conditions."
          - "Target genes or proteins are selected for perturbation."
          - "Success criteria for the first run are defined."
      - type: h3
        text: "First Run Flow"
      - type: ol
        items:
          - "Create a new simulation and choose perturbation mode."
          - "Configure condition parameters and selected targets."
          - "Run simulation, inspect marker-level changes, and export summary."
      - type: alert_next
        prefix: "Next: read "
        link_label: "Concepts"
        url: "/docs/concepts/"
        suffix: " to align interpretation across your team."

  docs_concepts:
    heading: "Concepts"
    intro: "These concepts provide a shared vocabulary for design, execution, and review."
    sections:
      - type: h3
        text: "Perturbation Mode"
      - type: p_html
        html: "Defines how targets are modified in simulation. Typical modes are <code>knockdown</code> and <code>activation</code>."
      - type: h3
        text: "Condition"
      - type: p
        text: "Represents experimental context (for example control vs treated) where target effects are estimated."
      - type: h3
        text: "Output Interpretation"
      - type: ul
        items:
          - "Prioritize candidates by effect magnitude and consistency."
          - "Review marker-level behavior aligned to biological rationale."
          - "Use exports for downstream ranking and experiment planning."
      - type: alert_next
        prefix: "Next: define reproducible inputs in "
        link_label: "Condition Spec"
        url: "/docs/condition-spec/"
        suffix: "."

  docs_condition_spec:
    heading: "Condition Spec"
    intro: "A condition spec defines a simulation request in a stable, repeatable structure."
    sections:
      - type: h3
        text: "Required Fields"
      - type: ul
        items:
          - "<code>dataset_id</code>: identifier of prepared data."
          - "<code>mode</code>: perturbation mode such as <code>knockdown</code>."
          - "<code>targets</code>: list of genes or proteins to perturb."
          - "<code>condition</code>: contextual label for the scenario."
      - type: h3
        text: "Example Spec"
      - type: pre
        code: |
          {
            "dataset_id": "ds_example_001",
            "mode": "knockdown",
            "targets": ["GENE_A", "GENE_B"],
            "condition": "treated"
          }
      - type: alert_next
        mt5: true
        prefix: "Next: call the endpoint in "
        link_label: "API"
        url: "/docs/api/"
        suffix: "."

  docs_api:
    heading: "API"
    intro: "Use the API for repeatable, scriptable simulation runs."
    sections:
      - type: h3
        text: "Authentication"
      - type: p_html
        html: "Send an API key in the <code>Authorization</code> header as <code>Bearer &lt;YOUR_API_KEY&gt;</code>."
      - type: h3
        text: "Endpoint"
      - type: ul
        items:
          - "<code>POST /v1/simulations</code>: create and run a simulation request."
      - type: h3
        text: "Minimal Request"
      - type: pre
        code: |
          curl -X POST "https://api.knockg.com/v1/simulations" \
            -H "Authorization: Bearer <YOUR_API_KEY>" \
            -H "Content-Type: application/json" \
            -d '{
              "dataset_id": "ds_example_001",
              "mode": "knockdown",
              "targets": ["GENE_A", "GENE_B"],
              "condition": "treated"
            }'
      - type: h3
        text: "Response (shape)"
      - type: pre
        code: |
          {
            "simulation_id": "sim_12345",
            "status": "completed",
            "summary": {
              "top_candidates": ["GENE_A", "GENE_B"]
            }
          }



