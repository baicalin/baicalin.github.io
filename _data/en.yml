# title: Home
# description: Build gene perturbation hypotheses faster with KnockG.

hero:
  eyebrow: "KnockG MVP"
  title: "Simulate perturbation outcomes before wet-lab execution / Bridging Life Sciences and AI"
  subtitle: "KnockG helps biology and drug discovery teams test hypotheses quickly by generating virtual omics outcomes from existing data. / KnockG<sup>TM</sup>, SilicoPharm's AI Omics Generation Solution, accelerates research in basic, medical, and pharmaceutical fields by generating virtual experimental results at low cost and high efficiency."
  button_text: "Try the free version now"

  primary_cta:
    label: "Get Started"
    url: "/get-started/"
  secondary_cta:
    label: "Read Docs"
    url: "/docs/"
  badges:
    - "Web app and API workflow"
    - "Designed for translational research"
    - "From question to shortlist in one flow"
  panel_heading: "What you can do on day one"
  panel_points:
    - "Load an existing dataset and select a perturbation scenario."
    - "Generate virtual expression responses for candidate targets."
    - "Export outputs for downstream prioritization and review."

value_props:
  heading: "Why teams use KnockG"
  description: "The platform is structured for fast iteration from hypothesis to decision."
  items:
    - title: "Shorten early exploration cycles"
      description: "Evaluate multiple target hypotheses before committing expensive experiment time."
    - title: "Compare perturbation scenarios"
      description: "Run side-by-side simulations for knockdown/activation conditions with consistent outputs."
    - title: "Keep decisions traceable"
      description: "Capture assumptions, generated results, and chosen candidates in a reproducible workflow."

how_it_works:
  heading: "How it works"
  description: "A minimal three-step process for moving from source data to candidate ranking."
  steps:
    - title: "Prepare and configure"
      description: "Choose a dataset, define baseline conditions, and select genes or proteins to perturb."
    - title: "Generate and inspect"
      description: "Run the model and inspect virtual omics outputs, marker-level changes, and confidence signals."
    - title: "Prioritize and export"
      description: "Rank candidates by effect and consistency, then export for team review or external analysis."

collaboration:
  heading: "Built for collaborative research programs"
  description: "KnockG supports shared workflows between computational scientists, wet-lab teams, and external partners."
  points:
    - "Align teams on one simulation-ready problem statement."
    - "Review target rationales with consistent model outputs."
    - "Transition from in silico shortlist to experimental planning."
  cta:
    heading: "See practical scenarios"
    description: "Review example use cases and expected outputs."
    label: "Explore Examples"
    url: "/examples/"

get_started:
  hero:
    eyebrow: "Get Started"
    title: "Run your first KnockG workflow in minutes"
    subtitle: "Start from the web app for rapid exploration, then move to the API when you need repeatable pipelines."
    primary_cta:
      label: "Open Docs"
      url: "/docs/"
    secondary_cta:
      label: "See Examples"
      url: "/examples/"
    side_panel:
      heading: "MVP Scope"
      description: "This guide covers setup, first run, and minimal API invocation."
  quickstart:
    heading: "Quickstart"
    description: "Follow this sequence to go from account setup to first result review."
    steps:
      - kicker: "Step 1"
        title: "Prepare workspace and dataset"
        description: "Define your baseline condition, target candidates, and expected comparison outputs."
      - kicker: "Step 2"
        title: "Run a first perturbation"
        description: "Use the web interface to configure one scenario and generate initial virtual omics output."
      - kicker: "Step 3"
        title: "Review and export"
        description: "Inspect marker-level changes, shortlist candidates, and export the run summary."
  web_vs_api:
    heading: "Web vs API"
    description: "Use the interface that matches your stage and team workflow."
    web:
      title: "Web App"
      description: "Best for exploration and collaborative review."
      points:
        - "Fast setup with guided inputs and visual validation."
        - "Useful for early target brainstorming sessions."
        - "Export-ready summaries for non-technical stakeholders."
    api:
      title: "API"
      description: "Best for automation and reproducible execution."
      points:
        - "Integrates with internal pipelines and notebooks."
        - "Supports standardized parameterized runs."
        - "Enables batch execution and downstream tooling."
  code:
    heading: "Minimal API snippet"
    description: "Use this minimal request as a starting point for your integration."
    doc_link:
      label: "API Docs"
      url: "/docs/api/"
    snippet: |
      curl -X POST "https://api.knockg.com/v1/simulations" \
        -H "Authorization: Bearer <YOUR_API_KEY>" \
        -H "Content-Type: application/json" \
        -d '{
          "dataset_id": "ds_example_001",
          "mode": "knockdown",
          "targets": ["GENE_A", "GENE_B"],
          "condition": "treated"
        }'

