hero:
  eyebrow: "KnockG"
  title: "Generate and leverage virtual experimental, diagnostic, and clinical data"
  subtitle: "KnockG<sup>TM</sup>, SilicoPharm’s omics foundation model solution, generates and analyzes virtual omics data for experimental, diagnostic, and clinical scenarios based on user-defined conditions. Researchers and clinicians can leverage this to discover novel targets, optimize clinical strategies, and improve bioprocesses such as cell therapy manufacturing."
  button_text: "Get Started for Free"

  primary_cta:
    label: "Start Now"
    url: "/get-started/"
  secondary_cta:
    label: "View Docs"
    url: "/docs/"
  badges:
    - "Web Application"
    - "Time-series & condition-specific omics data generation"
    - "Validated in oncology and neurodegenerative diseases"
    - "Proven PoC cases with innovative drug companies"
  panel_heading: "Key Capabilities"
  # panel_points:
  #   - "Automated preprocessing of public and uploaded omics datasets"
  #   - "Condition-driven virtual data generation (target perturbation, single/combination drug treatment, etc.)"
  #   - "Generation of missing timepoints (intermediate or future states)"
  #   - "Pseudo-experimental outputs (e.g., blotting) for pre-experimental validation"
  #   - "Ranking of effective conditions with integrated literature and drug database search"
  panel_points:
    - "Automated preprocessing of public & uploaded omics data"
    - "Target perturbation simulation"
    - "Drug & combination simulation"
    - "Timepoint expansion (intermediate & future)"
    - "Pseudo-experimental outputs"
    - "Ranking & knowledge integration (literature, drugs, patents)"
value_props:
  heading: "Why KnockG"
  description: "KnockG is designed with an automated pipeline that enables life science researchers—even without programming expertise—to generate and analyze omics data. By exploring virtual conditions in silico, users can reduce time and cost in experiments and clinical studies while enabling evidence-generating research."
  items:
    - title: "Virtual generation of hard-to-obtain data"
      description: "Generate data for conditions or samples that are difficult or impossible to obtain due to ethical, practical, or rarity constraints."
    - title: "Simulation of experimental and clinical outcomes"
      description: "Generate unseen data such as target perturbation experiments, cohort-specific clinical responses, and process-variable conditions in cell culture and manufacturing."
    - title: "End-to-end data workflow"
      description: "Provides preprocessing, condition configuration, analysis, and visualization of generated omics data in a unified workflow."

how_it_works:
  heading: "How It Works"
  steps:
    - title: "Select reference omics data"
      description: "Use preprocessed dataset, import from public database or upload your own dataset."
    - title: "Generate condition-specific data"
      description: "Create virtual omics data for conditions not present in training data based on user-defined inputs (e.g., target perturbation, timepoint extension, drug treatment)."
    - title: "Analyze and apply results"
      description: "Visualize generated data and compare conditions to support validation experiments, evidence generation, and optimization of clinical or process conditions."

collaboration:
  heading: "Designed for AI Ecosystem Integration"
  description: "KnockG is provided as a web application, API, and MCP, serving as a data generation and augmentation layer that integrates seamlessly with structure-based AI and omics AI systems."
  points:
    - "Intuitive web interface accessible to non-programmers"
    - "Seamless integration with external AI systems via API and MCP"
    - "Supports workflows from target discovery to preclinical and clinical stages alongside structure-based AI"
    - "Enhances predictive omics AI by providing virtual input data (e.g., future timepoints, cohorts)"
  cta:
    heading: "Explore Use Cases"
    description: "Discover applications in target discovery, clinical research, and bioprocess optimization."
    label: "View Examples"
    url: "/examples/"

get_started:
  hero:
    eyebrow: "Get Started"
    title: "Start your first analysis in minutes"
    subtitle: "Sign up on the web and get started for free. Scale up anytime as your needs grow."
    primary_cta:
      label: "Open Docs"
      url: "/docs/"
    secondary_cta:
      label: "View Examples"
      url: "/examples/"
    side_panel:
      heading: "Scope"
      description: "This guide covers dataset selection, condition setup, and result exploration."

  quickstart:
    steps:
      - kicker: "Step 1"
        title: "Select a dataset"
        description: "Search and select an available preprocessed dataset from the top panel in the analysis interface. (<a href='https://www.knockg.com/screenings/new?subcategory=screening'>link</a>)"

      - kicker: "Step 2"
        title: "Set generation conditions"
        description: "After selecting a dataset, choose the perturbation or disease context (e.g., breast cancer) and a preset condition (e.g., single target knockdown). (<a href='https://www.knockg.com/screenings/new?subcategory=screening&perturbation=1&preset=1'>link</a>)"

      - kicker: "Step 3"
        title: "Analyze and export results"
        description: "Review candidate outputs based on generated data, including marker expression changes and associated literature, patents, and drug information. (<a href='https://www.knockg.com/screenings/1066'>link</a>)"

  web_vs_api:
    heading: "Web vs API"
    description: "Choose the interface that fits your workflow."
    web:
      title: "Web Application"
      description: "Best for fast exploration and collaborative review."
      points:
        - "Quick start with guided workflows and AI-assisted setup"
        - "Ideal for early-stage target brainstorming and team discussions"
        - "Accessible to non-programmers"

    api:
      title: "API"
      description: "Best for automation and large-scale execution."
      points:
        - "Easily integrates with internal pipelines and notebook environments"
        - "Supports standardized, parameter-driven execution"
        - "Efficient for large-scale data analysis"

  code:
    heading: "API Example"
    description: "A minimal request example to get started with integration."
    doc_link:
      label: "API Docs"
      url: "/docs/api/"
    snippet: |
      curl -X POST "https://api.knockg.com/v1/simulations" \
        -H "Authorization: Bearer <YOUR_API_KEY>" \
        -H "Content-Type: application/json" \
        -d '{
          "dataset_id": "ds_example_001",
          "mode": "knockdown",
          "targets": ["GENE_A", "GENE_B"],
          "condition": "treated"
        }'

