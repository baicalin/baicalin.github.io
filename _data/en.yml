faq:
  section_title: "FAQ"
  main_title: "Frequently Asked Questions"
  contact_info: "For any other inquiries and requests, feel free to reach us at contact@silicopharm.com."
  items:
    - id: "qna_0"
      question: "How accurate is it?"
      answer: "The significance of the solution is validated through various statistical methodologies, and relevant literature and POC results can be sent upon request."
    - id: "qna_1"
      question: "How do I start using the solution?"
      answer: "You can start using it by registering on lite.knockg.com or www.knockg.com."
    - id: "qna_2"
      question: "What's the difference between KnockG and KnockG (PAID)?"
      answer: "Even without payment, you can use all the features, but targets are anonymized. However, you can still observe changes in key marker expression and target expression to assess result accuracy before payment. Anonymization can be lifted after payment."
    - id: "qna_3"
      question: "What data should I use?"
      answer: "The solution can learn from normalized expression data and shows high accuracy in single-cell transcriptomics. POCs have shown that significant results can be obtained even with tissue-level transcriptomics and proteomics data."
    - id: "qna_4"
      question: "What is the payment method and duration?"
      answer: "You can pay per AI model trained by disease or cell type. No extra cost is charged for analyzing paid models (e.g., knockdown simulation, pseudo-blotting, etc.). Quotes are offered based on the scale of the model and additional requests."
    - id: "qna_5"
      question: "What are the advantages of using the solution?"
      answer: "Besides deriving new targets in 30 minutes (with model training taking up to 2 weeks), it predicts expression changes in specific scenarios in a form equivalent to experimental results without actual experiments."

