<section id="landingContact" class="section-py bg-body landing-contact" style="padding-top:50px; padding-bottom:50px;">
  <div class="container bg-icon-left position-relative">
    <img
      src="{{ '/assets/img/front-pages/icons/bg-left-icon-light.png' | relative_url }}"
      alt="section icon"
      class="position-absolute top-0 start-0"
      data-speed="1"
      data-app-light-img="front-pages/icons/bg-left-icon-light.png"
      data-app-dark-img="front-pages/icons/bg-left-icon-dark.png" />
    <h6 class="text-center d-flex justify-content-center align-items-center mb-6">
      <img
        src="{{ '/assets/img/front-pages/icons/section-tilte-icon.png' | relative_url }}"
        alt="section title icon"
        class="me-3" />
      <span class="text-uppercase">{{ site.data[page.lang].contact_us.section_title }}</span>
    </h6>
    <h5 class="text-center mb-2">
      <span class="display-5 fs-4 fw-bold">{{ site.data[page.lang].contact_us.main_title_bold }}</span>{{ site.data[page.lang].contact_us.main_title }}
    </h5>
    <p class="text-center fw-medium mb-4 mb-md-12 pb-3">
      {{ site.data[page.lang].contact_us.description }}
    </p>
  </div>
</section>
