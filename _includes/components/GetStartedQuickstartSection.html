{% assign gs = page.get_started %}
<section class="section-py mvp-get-started-quickstart bg-body">
  <div class="container py-8">
    <h2 class="fw-bold mb-3">{{ gs.quickstart.heading }}</h2>
    <p class="mb-6">{{ gs.quickstart.description }}</p>
    <div class="row g-6">
      {% for step in gs.quickstart.steps %}
        <div class="col-md-4">
          <div class="card h-100 shadow-none border">
            <div class="card-body p-6">
              <span class="badge bg-primary mb-3">{{ step.kicker }}</span>
              <h5 class="mb-3">{{ step.title }}</h5>
              <p class="mb-0">{{ step.description }}</p>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
