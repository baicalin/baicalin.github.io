<!DOCTYPE html>
{% assign lang = site.active_lang %}
{% assign t = site.data[lang] %}
<html lang="{{ lang }}"
      class="light-style layout-navbar-fixed layout-wide"
      dir="ltr"
      data-theme="theme-default"
      data-assets-path="{{ '/assets/' | relative_url }}"
      data-template="front-pages"
      data-style="light">
  <head>
    {% include head.html mvp=true %}
  </head>
  <body>
    <script src="{{ '/assets/vendor/js/dropdown-hover.js' | relative_url }}"></script>
    <script src="{{ '/assets/vendor/js/mega-dropdown.js' | relative_url }}"></script>

    {% include ui/HeaderNav.html %}

    <main class="mvp-page default-page" style="min-height: 100vh;">
      {{ content }}
    </main>

    {% include ui/Footer.html %}
    {% include scripts.html %}

    {% if page.enable_channeltalk %}
    <script>
      (function () {
        var w = window;
        if (w.ChannelIO) return;
        var ch = function () { ch.c(arguments); };
        ch.q = []; ch.c = function (args) { ch.q.push(args); };
        w.ChannelIO = ch;

        function l() {
          if (w.ChannelIOInitialized) return;
          w.ChannelIOInitialized = true;
          var s = document.createElement("script");
          s.type = "text/javascript";
          s.async = true;
          s.src = "https://cdn.channel.io/plugin/ch-plugin-web.js";
          var x = document.getElementsByTagName("script")[0];
          if (x.parentNode) x.parentNode.insertBefore(s, x);
        }

        if (document.readyState === "complete") l();
        else {
          w.addEventListener("DOMContentLoaded", l);
          w.addEventListener("load", l);
        }
      })();

      ChannelIO('boot', {
        pluginKey: "d0e8dc75-ef8e-46db-a7e5-ea87be6c0006",
        language: "{{ lang }}"
      });
    </script>
    {% endif %}
  </body>
</html>
